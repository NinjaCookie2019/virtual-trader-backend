name: Railway Trading Scheduler

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Railway backend action"
        required: true
        default: "status"
        type: choice
        options:
          - start
          - stop
          - status

concurrency:
  group: railway-trading-scheduler
  cancel-in-progress: false

env:
  BACKEND_URL: "https://virtual-trader-backend-production.up.railway.app"
  RAILWAY_PROJECT_ID: "9f3a8e80-186b-464d-b46b-2d069b382e0d"
  RAILWAY_SERVICE_ID: "0ca89c43-c5d4-4f38-a411-8d3fc2b52d54"
  RAILWAY_ENVIRONMENT_ID: "4fad0b67-ebc5-4862-acdf-b90109bcf913"

jobs:
  schedule-railway:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide scheduler action
        id: decide
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ACTION="${{ inputs.action }}"
          else
            IST_MINUTES=$(TZ=Asia/Kolkata date +%H%M)
            if [ "$IST_MINUTES" -ge 855 ] && [ "$IST_MINUTES" -le 920 ]; then
              ACTION="start"
            elif [ "$IST_MINUTES" -ge 1540 ] && [ "$IST_MINUTES" -le 1555 ]; then
              ACTION="stop"
            else
              ACTION="status"
            fi
          fi

          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "Scheduler action: $ACTION"
          echo "Event name: ${{ github.event_name }}"
          echo "Event schedule: ${{ github.event.schedule }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "IST now: $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S')"

      - name: Validate Railway token
        shell: bash
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "${RAILWAY_API_TOKEN:-}" ]; then
            echo "::error::Missing GitHub secret RAILWAY_TOKEN. Add it in repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Railway status before action
        shell: bash
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          python .github/scripts/railway_service.py status

      - name: Start backend replica
        if: steps.decide.outputs.action == 'start'
        shell: bash
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if curl -fsS --max-time 8 "$BACKEND_URL/api/health" > /dev/null; then
            echo "Backend is already healthy; skipping Railway deploy."
            exit 0
          fi

          python .github/scripts/railway_service.py start

      - name: Warm backend and read state
        if: steps.decide.outputs.action == 'start'
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl -fsS "$BACKEND_URL/api/health" > /dev/null; then
              echo "Backend health check passed."
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "::error::Backend did not become healthy after 5 minutes."
              exit 1
            fi

            echo "Waiting for backend to boot... attempt $attempt/30"
            sleep 10
          done

          curl -fsS "$BACKEND_URL/api/state" | python -m json.tool

      - name: Stop backend replica
        if: steps.decide.outputs.action == 'stop'
        shell: bash
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          python .github/scripts/railway_service.py stop

      - name: Status
        if: steps.decide.outputs.action == 'status'
        shell: bash
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          python .github/scripts/railway_service.py status
          curl -fsS "$BACKEND_URL/api/state" | python -m json.tool || true
